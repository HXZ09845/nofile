name: Feature request
description: Suggest an improvement for NoFile.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem would this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like NoFile to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other ways to solve this?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, or related apps.
