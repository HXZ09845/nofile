name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve NoFile."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: "NoFile did not capture a screenshot after..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the problem.
      placeholder: |
        1. Start NoFile
        2. Save a file to Downloads
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.x"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node -v"
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, logs, or other context.
